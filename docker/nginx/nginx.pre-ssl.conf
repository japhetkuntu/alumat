# =============================================================================
# UMaT Alumni – Nginx Pre-SSL Bootstrap Configuration
# =============================================================================
# HTTP-only. Used during initial SSL certificate issuance.
#
# nginx cannot start when ssl_certificate directives reference files that do
# not yet exist. This config omits all HTTPS/SSL blocks so nginx starts
# cleanly, serves ACME challenges, and lets certbot write real certs.
#
# Workflow (handled automatically by ./deploy.sh --ssl):
#   1. Start nginx with THIS config  →  nginx comes up on port 80
#   2. certbot webroot challenge     →  certs written to alumni_certbot_conf
#   3. Restart nginx with nginx.conf →  full HTTPS enabled
# =============================================================================

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;

    client_max_body_size 50M;

    proxy_http_version    1.1;
    proxy_set_header      Host              $host;
    proxy_set_header      X-Real-IP         $remote_addr;
    proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header      X-Forwarded-Proto $scheme;
    proxy_read_timeout    120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    120s;

    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    # ==========================================================================
    # alumat-api.umat.edu.gh  –  Member API
    # ==========================================================================
    server {
        listen 80;
        server_name alumat-api.umat.edu.gh;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            proxy_pass http://member-api:8080;
        }
    }

    # ==========================================================================
    # admin-alumat-api.umat.edu.gh  –  Admin API
    # ==========================================================================
    server {
        listen 80;
        server_name admin-alumat-api.umat.edu.gh;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            proxy_pass http://admin-api:8080;
        }
    }

    # ==========================================================================
    # admin-alumat.umat.edu.gh  –  Admin Portal
    # ==========================================================================
    server {
        listen 80;
        server_name admin-alumat.umat.edu.gh;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            proxy_pass http://frontend-admin:3000;
        }
    }

    # ==========================================================================
    # alumat.umat.edu.gh  –  Member Portal (root domain)
    # ==========================================================================
    server {
        listen 80;
        server_name alumat.umat.edu.gh www.alumat.umat.edu.gh;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location = /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "OK\n";
        }

        location / {
            proxy_pass http://frontend-member:3000;
        }
    }

    # ==========================================================================
    # cdn.alumat.umat.edu.gh  –  MinIO CDN
    # ==========================================================================
    server {
        listen 80;
        server_name cdn.alumat.umat.edu.gh;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            proxy_pass http://minio:9000;
            proxy_set_header Host $http_host;
        }
    }

    # ==========================================================================
    # Default – redirect bare IP/unknown hosts to canonical domain
    # ==========================================================================
    server {
        listen 80 default_server;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 http://alumat.umat.edu.gh$request_uri;
        }
    }
}
