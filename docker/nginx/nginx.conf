# =============================================================================
# UMaT Alumni – Nginx Production Gateway (domain mode)
# =============================================================================
# Routing model:
#
#   alumni.umat.edu.gh           → frontend-member:3000  (member portal)
#   admin.alumni.umat.edu.gh     → frontend-admin:3000   (admin portal)
#   api.alumni.umat.edu.gh       → member-api:8080
#   admin-api.alumni.umat.edu.gh → admin-api:8080
#   <server-ip> (default)        → 301 → alumni.umat.edu.gh
#
# HTTPS upgrade: run  ./deploy.sh --ssl  then add SSL blocks and restart nginx.
# =============================================================================

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance ────────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;

    client_max_body_size 50M;

    # ── Compression ────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml font/truetype font/opentype image/svg+xml;

    # ── Global proxy settings ──────────────────────────────────────────────────
    proxy_http_version    1.1;
    proxy_set_header      Host              $host;
    proxy_set_header      X-Real-IP         $remote_addr;
    proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header      X-Forwarded-Proto $scheme;
    proxy_set_header      Upgrade           $http_upgrade;
    proxy_set_header      Connection        keep-alive;
    proxy_read_timeout    120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    120s;
    proxy_buffer_size     4k;
    proxy_buffers         8 4k;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                       always;
    add_header X-Content-Type-Options "nosniff"                          always;
    add_header X-XSS-Protection       "1; mode=block"                    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy     "geolocation=(), microphone=()"    always;

    # ── Docker embedded DNS ────────────────────────────────────────────────────
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    # ==========================================================================
    # api.alumni.umat.edu.gh  –  Member API
    # ==========================================================================
    server {
        listen 80;
        server_name api.alumni.umat.edu.gh;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            set $upstream http://alumni-member-api:8080;
            proxy_pass $upstream;
        }
    }

    # ==========================================================================
    # admin-api.alumni.umat.edu.gh  –  Admin API
    # ==========================================================================
    server {
        listen 80;
        server_name admin-api.alumni.umat.edu.gh;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            set $upstream http://alumni-admin-api:8080;
            proxy_pass $upstream;
        }
    }

    # ==========================================================================
    # admin.alumni.umat.edu.gh  –  Admin Portal
    # ==========================================================================
    server {
        listen 80;
        server_name admin.alumni.umat.edu.gh;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            set $upstream http://alumni-frontend-admin:3000;
            proxy_pass $upstream;
        }
    }

    # ==========================================================================
    # alumni.umat.edu.gh  –  Member Portal (root domain)
    # ==========================================================================
    server {
        listen 80;
        server_name alumni.umat.edu.gh www.alumni.umat.edu.gh;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location = /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "OK\n";
        }

        location / {
            set $upstream http://alumni-frontend-member:3000;
            proxy_pass $upstream;
        }
    }

    # ==========================================================================
    # Default – redirect bare IP to canonical domain
    # ==========================================================================
    server {
        listen 80 default_server;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 http://alumni.umat.edu.gh$request_uri;
        }
    }
}
