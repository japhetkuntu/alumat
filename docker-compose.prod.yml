# =============================================================================
# UMaT Alumni – Production Docker Compose
# =============================================================================
# Usage:
#   cp .env.production.example .env   # then fill in all secrets
#   ./deploy.sh                       # guided full deployment
# Prerequisites:
#   .env must be populated (no defaults for secrets in this file)
# =============================================================================

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    env_file: .env
    image: postgres:16-alpine
    container_name: alumni-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Loopback-only: not reachable from the internet.
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-schema.sql:/docker-entrypoint-initdb.d/init-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - alumni-net

  redis:
    env_file: .env
    image: redis:7-alpine
    container_name: alumni-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    # Loopback-only.
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - alumni-net

  minio:
    env_file: .env
    image: minio/minio:latest
    container_name: alumni-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    # Expose MinIO externally so uploaded files can be served from the browser.
    ports:
      - "0.0.0.0:${MINIO_API_PORT:-9000}:9000"
      - "0.0.0.0:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - alumni-net

  minio-init:
    env_file: .env
    image: minio/mc:latest
    container_name: alumni-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://alumni-minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
        mc mb --ignore-existing local/$$MINIO_BUCKET_NAME;
        mc anonymous set download local/$$MINIO_BUCKET_NAME;
        exit 0;
      "
    networks:
      - alumni-net

  # ── Backend APIs ─────────────────────────────────────────────────────────────
  # No host ports – nginx routes all external traffic internally.

  admin-api:
    env_file: .env
    build:
      context: ./backend
      dockerfile: src/Umat.Alumni.Admin.Api/Dockerfile
    image: alumni/admin-api:prod
    container_name: alumni-admin-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__AlumniConnection: >-
        Host=postgres;Port=5432;Database=${POSTGRES_DB};
        Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};SearchPath=alumni
      Redis__AdminRedisConfig__ConnectionString: redis:6379
      Redis__AdminRedisConfig__DbNumber: 0
      BearerTokenConfig__Issuer: ${JWT_ISSUER}
      BearerTokenConfig__Audience: ${JWT_AUDIENCE}
      BearerTokenConfig__AdminSigningKey: ${ADMIN_SIGNING_KEY}
      BearerTokenConfig__MemberSigningKey: ${MEMBER_SIGNING_KEY}
      MailhogConfig__SmtpHost: ${SMTP_HOST}
      MailhogConfig__SmtpPort: ${SMTP_PORT}
      MailhogConfig__UseSsl: ${USE_SSL:-false}
      MailhogConfig__UseStartTls: ${USE_STARTTLS:-true}
      MailhogConfig__SmtpUsername: ${SMTP_USERNAME}
      MailhogConfig__SmtpPassword: ${SMTP_PASSWORD}
      MailhogConfig__DefaultSenderName: ${SMTP_SENDER_NAME}
      MailhogConfig__DefaultSenderEmail: ${SMTP_SENDER_EMAIL}
      StorageConfig__AccessKey: ${STORAGE_ACCESS_KEY}
      StorageConfig__SecretKey: ${STORAGE_SECRET_KEY}
      StorageConfig__BucketName: ${STORAGE_BUCKET}
      StorageConfig__Region: ${STORAGE_REGION}
      StorageConfig__Endpoint: ${STORAGE_ENDPOINT}
      StorageConfig__CdnEndpoint: ${STORAGE_CDN_ENDPOINT}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - alumni-net

  member-api:
    env_file: .env
    build:
      context: ./backend
      dockerfile: src/Umat.Alumni.Member.Api/Dockerfile
    image: alumni/member-api:prod
    container_name: alumni-member-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__AlumniConnection: >-
        Host=postgres;Port=5432;Database=${POSTGRES_DB};
        Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};SearchPath=alumni
      Redis__MemberRedisConfig__ConnectionString: redis:6379
      Redis__MemberRedisConfig__DbNumber: 1
      BearerTokenConfig__Issuer: ${JWT_ISSUER}
      BearerTokenConfig__Audience: ${JWT_AUDIENCE}
      BearerTokenConfig__AdminSigningKey: ${ADMIN_SIGNING_KEY}
      BearerTokenConfig__MemberSigningKey: ${MEMBER_SIGNING_KEY}
      PaystackConfig__SecretKey: ${PAYSTACK_SECRET_KEY}
      PaystackConfig__PublicKey: ${PAYSTACK_PUBLIC_KEY}
      PaystackConfig__CallbackUrl: ${PAYSTACK_CALLBACK_URL}
      MailhogConfig__SmtpHost: ${SMTP_HOST}
      MailhogConfig__SmtpPort: ${SMTP_PORT}
      MailhogConfig__UseSsl: ${USE_SSL:-false}
      MailhogConfig__UseStartTls: ${USE_STARTTLS:-true}
      MailhogConfig__SmtpUsername: ${SMTP_USERNAME}
      MailhogConfig__SmtpPassword: ${SMTP_PASSWORD}
      MailhogConfig__DefaultSenderName: ${SMTP_SENDER_NAME}
      MailhogConfig__DefaultSenderEmail: ${SMTP_SENDER_EMAIL}
      StorageConfig__AccessKey: ${STORAGE_ACCESS_KEY}
      StorageConfig__SecretKey: ${STORAGE_SECRET_KEY}
      StorageConfig__BucketName: ${STORAGE_BUCKET}
      StorageConfig__Region: ${STORAGE_REGION}
      StorageConfig__Endpoint: ${STORAGE_ENDPOINT}
      StorageConfig__CdnEndpoint: ${STORAGE_CDN_ENDPOINT}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - alumni-net

  # ── Frontend Apps ─────────────────────────────────────────────────────────
  # NEXT_PUBLIC_* variables are baked into the JS bundle at build time.
  # They must point to URLs reachable from the user's browser (public URLs).

  frontend-admin:
    env_file: .env
    build:
      context: ./frontend/apps/admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_ADMIN_API_URL: ${NEXT_PUBLIC_ADMIN_API_URL}
    image: alumni/frontend-admin:prod
    container_name: alumni-frontend-admin
    restart: unless-stopped
    depends_on:
      - admin-api
    networks:
      - alumni-net

  frontend-member:
    env_file: .env
    build:
      context: ./frontend/apps/member
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_MEMBER_API_URL: ${NEXT_PUBLIC_MEMBER_API_URL}
    image: alumni/frontend-member:prod
    container_name: alumni-frontend-member
    restart: unless-stopped
    depends_on:
      - member-api
    networks:
      - alumni-net

  # ── Gateway ────────────────────────────────────────────────────────────────
  # Only service that exposes ports to the internet.

  nginx:
    image: nginx:1.27-alpine
    container_name: alumni-nginx
    restart: unless-stopped
    ports:
      # Domain mode: only 80 + 443 are needed.
      - "80:80"
      - "443:443"
      # IP mode (nginx.ip.conf): one port per service.
      - "8001:8001"   # admin frontend
      - "8081:8081"   # member api
      - "8082:8082"   # admin api
    volumes:
      - ${NGINX_CONF_FILE:-./docker/nginx/nginx.conf}:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl-params.conf:/etc/nginx/ssl-params.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - admin-api
      - member-api
      - frontend-admin
      - frontend-member
    networks:
      - alumni-net

  # ── SSL auto-renewal ───────────────────────────────────────────────────────
  # Issues initial cert via: ./deploy.sh --ssl
  # Checks for renewal every 12 h automatically.

  certbot:
    image: certbot/certbot:latest
    container_name: alumni-certbot
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"

# =============================================================================
# Named volumes
# =============================================================================
volumes:
  postgres_data:
    name: alumni_postgres_data
  redis_data:
    name: alumni_redis_data
  minio_data:
    name: alumni_minio_data
  certbot_www:
    name: alumni_certbot_www
  certbot_conf:
    name: alumni_certbot_conf

# =============================================================================
# Networks
# =============================================================================
networks:
  alumni-net:
    name: alumni-net
    driver: bridge
