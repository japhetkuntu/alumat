<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f7fafc; margin: 0; padding: 0; }
    .container { max-width: 560px; margin: 32px auto; padding: 24px; background: #fff; border-radius: 18px; box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08); }
    .brand { font-size: 14px; letter-spacing: 2px; color: #065f46; text-transform: uppercase; margin-bottom: 18px; }
    h1 { font-size: 24px; color: #0f172a; margin: 0 0 20px; }
    p { font-size: 15px; line-height: 1.75; color: #334155; }
    .otp { display: inline-block; margin: 24px 0; padding: 18px 28px; background: #ecfccb; color: #14532d; font-size: 28px; font-weight: 700; letter-spacing: 8px; border-radius: 14px; }
    .footer { margin-top: 26px; color: #64748b; font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">UMaT Alumni</div>
    <h1>Verify your email</h1>
    <p>Hi {{first_name}},</p>
    <p>Use the code below to complete your registration. It expires in 15 minutes.</p>
    <div class="otp">{{otp_code}}</div>
    <p>If you did not request this code, ignore this email.</p>
    <div class="footer">If you need help, reply to this message or visit the alumni portal.</div>
  </div>
</body>
</html>
