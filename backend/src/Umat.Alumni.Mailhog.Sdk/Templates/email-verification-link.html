<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f7fafc; margin: 0; padding: 0; }
    .container { max-width: 560px; margin: 32px auto; padding: 24px; background: #fff; border-radius: 18px; box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08); }
    .brand { font-size: 14px; letter-spacing: 2px; color: #065f46; text-transform: uppercase; margin-bottom: 18px; }
    h1 { font-size: 24px; color: #0f172a; margin: 0 0 20px; }
    p { font-size: 15px; line-height: 1.75; color: #334155; }
    .button { display: inline-block; padding: 12px 22px; background: #065f46; color: #fff; border-radius: 10px; text-decoration: none; font-weight: 600; margin-top: 18px; }
    .footer { margin-top: 26px; color: #64748b; font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">UMaT Alumni</div>
    <h1>Verify your email</h1>
    <p>Hi {{first_name}},</p>
    <p>Tap the button below to confirm your email address and complete your account setup.</p>
    <a class="button" href="{{verify_url}}">Verify Email</a>
    <p>If you did not request this email, you can safely ignore it.</p>
    <div class="footer">If the button does not work, copy and paste the link into your browser.</div>
  </div>
</body>
</html>
