<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f7fafc; margin: 0; padding: 0; }
    .container { max-width: 560px; margin: 32px auto; padding: 24px; background: #fff; border-radius: 18px; box-shadow: 0 20px 40px rgba(15,23,42,0.08); }
    .brand { font-size: 14px; letter-spacing: 2px; color: #065f46; text-transform: uppercase; margin-bottom: 18px; }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 18px; background: #dcfce7; color: #15803d; }
    h1 { font-size: 22px; color: #0f172a; margin: 0 0 14px; }
    p { font-size: 15px; line-height: 1.75; color: #334155; margin: 0 0 12px; }
    .cta { display: inline-block; margin: 20px 0; padding: 12px 28px; background: #065f46; color: #fff; text-decoration: none; font-size: 14px; font-weight: 700; border-radius: 10px; letter-spacing: 0.3px; }
    .footer { margin-top: 28px; padding-top: 20px; border-top: 1px solid #f1f5f9; color: #94a3b8; font-size: 12px; }
    .footer a { color: #065f46; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">UMaT Alumni</div>
    <span class="badge">{{badge_label}}</span>
    <h1>{{title}}</h1>
    <p>Hi {{first_name}},</p>
    <p>{{body}}</p>
    <a href="{{action_url}}" class="cta">{{action_label}}</a>
    <div class="footer">
      You're receiving this because you have <strong>{{pref_label}}</strong> enabled in your account settings.
    </div>
  </div>
</body>
</html>
